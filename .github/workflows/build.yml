name: Build & Test (Node 24)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linter
        run: npm run lint || true
      
      - name: Build plugin
        run: npm run build
      
      - name: Run tests
        run: npm test || true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-node24
          path: |
            dist/
            build/
            src/
          retention-days: 30
      
      - name: Upload XPI package
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: xpi-package
          path: '*.xpi'
          retention-days: 90
