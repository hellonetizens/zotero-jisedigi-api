<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      .icon-bg { fill: #2E7D32; }
      .icon-text { fill: white; font-size: 28px; font-weight: bold; text-anchor: middle; }
      .icon-api { fill: white; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" class="icon-bg"/>
  
  <!-- API symbol (interconnected nodes) -->
  <circle cx="20" cy="20" r="4" class="icon-api"/>
  <circle cx="44" cy="20" r="4" class="icon-api"/>
  <circle cx="32" cy="40" r="4" class="icon-api"/>
  
  <!-- Connection lines -->
  <line x1="20" y1="20" x2="44" y2="20" stroke="white" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="32" y2="40" stroke="white" stroke-width="1.5"/>
  <line x1="44" y1="20" x2="32" y2="40" stroke="white" stroke-width="1.5"/>
  
  <!-- API text -->
  <text x="32" y="55" class="icon-text" font-size="12">API</text>
</svg>
